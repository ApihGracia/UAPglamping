<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Glamping Admin Dashboard</title>
  <link rel="stylesheet" href="../admincss/admin.css">
</head>

<body>

<div class="login-container" id="loginPage">
  <div class="login-box">

    <div class="upload-instructions" style="display: none;">
      <h3>📷 How to Upload Your Logo Permanently</h3>
      <p>Your logo will appear on both the login page and dashboard sidebar</p>
    </div>

    <div class="login-logo-container" id="loginLogoContainer">
      <div class="login-logo" id="loginLogo"></div>
      <div class="login-logo-overlay">
        Click to Upload<br>Your Logo
      </div>
      <input type="file" id="loginLogoInput" accept="image/*" style="display:none;">
    </div>

    <h1 id="companyNameLogin">UPSI Glamping</h1>
    <p>Admin Dashboard Login</p>

    <!-- MESSAGE (ASAL – DIGUNAKAN) -->
    <p id="loginMsg" class="login-error"></p>

    <form id="loginForm">
      <div class="form-group">
        <label>Username</label>
        <input type="text" id="username" required>
      </div>

      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" required>
      </div>

      <button type="submit" class="login-btn">Sign In</button>
    </form>

  </div>
</div>

<script src="../adminjavascript/loginadmin.js"></script>
</body>
</html>
